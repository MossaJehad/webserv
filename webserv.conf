server {
    listen 5000;
    server_name localhost webserv.local;
    client_max_body_size 10m;

    error_page 400 ./www/html/errors/400.html;
    error_page 403 ./www/html/errors/403.html;
    error_page 404 ./www/html/errors/404.html;
    error_page 405 ./www/html/errors/405.html;
    error_page 413 ./www/html/errors/413.html;
    error_page 500 ./www/html/errors/500.html;

    location / {
        root ./www/html;
        index index.html;
        allow_methods GET POST DELETE;
        autoindex off;
    }

    location /files/ {
        root ./www/html;
        allow_methods GET DELETE;
        autoindex on;
    }

    location /upload/ {
        root ./www/html;
        allow_methods GET POST;
        upload_path ./www/uploads;
        client_max_body_size 20m;
    }

    location /cgi-bin/ {
        root ./www;
        allow_methods GET POST;
        cgi_ext .py .php .sh;
    }
}

server {
    listen 5001;
    server_name test.local;
    client_max_body_size 1m;

    location / {
        root ./www/html;
        index index.html;
        allow_methods GET;
        autoindex on;
    }
}
